"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "Lyr"
email = "lyr-7d1h@pm.me"

[ui]
default-command = "log"
pager = "delta"
diff-formatter = ":git"
diff-editor = ":builtin"
merge-editor = "vscode"

[templates]
git_push_bookmark = '"lyr/push-" ++ change_id.short()'
# show diff in commands like 'describe'
draft_commit_description = '''
concat(
  coalesce(description, default_commit_description, "\n"),
  surround(
    "\nJJ: This commit contains the following changes:\n", "",
    indent("JJ:     ", diff.stat(72)),
  ),
  "\nJJ: ignore-rest\n",
  diff.git(),
)
'''

[aliases]
gp = ["git", "push", "--allow-new"]
# Push new bookmarks for all bookmarks after working commit
gpd = ["git", "push", "--allow-new", "-r", "descendants(@) & remote_bookmarks(remote=origin)"]
gf = ["git", "fetch"]
dm = ["desc", "-m"]
cm = ["commit", "-m"]
e = ["edit"]
outdated = ["log", "-r", "bookmarks() & ~(master@origin | remote_bookmarks())"]

[remotes.origin]
auto-track-bookmarks = "*"
